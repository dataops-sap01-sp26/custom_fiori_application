<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Data Export and Report Subscription</title>
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
        }
        /* App loading spinner - shown until UI5 component is ready */
        #drs-app-loading {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f7f7f7;
        }
        .drs-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top-color: #0854a0;
            border-radius: 50%;
            animation: drs-spin 0.8s linear infinite;
        }
        .drs-loading-text {
            margin-top: 16px;
            font-family: "72", "72full", Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: #32363a;
        }
        @keyframes drs-spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script
        id="sap-ui-bootstrap"
        src="/sap/public/bc/ui5_ui5/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{
            "z.sap01.cfa": "./"
        }'
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted"
    ></script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <div id="drs-app-loading">
        <div class="drs-spinner"></div>
        <div class="drs-loading-text">Loading...</div>
    </div>
    <div
        data-sap-ui-component
        data-name="z.sap01.cfa"
        data-id="container"
        data-settings='{"id" : "z.sap01.cfa"}'
        data-handle-validation="true"
    ></div>
</body>
</html>
